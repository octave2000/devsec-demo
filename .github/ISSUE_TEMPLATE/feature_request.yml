name: Feature request
description: Suggest an idea or enhancement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please share enough detail for us to evaluate the request.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Describe the problem this request solves or the opportunity it creates.
      placeholder: What need are you trying to address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
      placeholder: A clear and concise description of the requested enhancement.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or workarounds you have considered.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add mockups, examples, or any other supporting information.
    validations:
      required: false
