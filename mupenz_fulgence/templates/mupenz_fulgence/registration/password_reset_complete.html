{% extends 'mupenz_fulgence/base.html' %}

{% block title %}Password Reset Complete | MF Auth{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-9 col-md-6 col-lg-5">
    <div class="card">
      <div class="card-body p-4 p-md-5 text-center">

        <i class="bi bi-shield-check fs-1 text-success mb-3"></i>
        <h3 class="fw-bold mb-2">Password Reset Complete</h3>

        <p class="text-muted mb-4">
          Your password has been set. You can now sign in with your new password.
        </p>

        <a href="{% url 'mupenz_fulgence:login' %}" class="btn btn-primary btn-lg">
          <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
        </a>

      </div>
    </div>
  </div>
</div>
{% endblock %}
